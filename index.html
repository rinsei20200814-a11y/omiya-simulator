<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RB大宮 突破シミュレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--card:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--green-bg:#0a2318;--green-bd:#196127;
  --red:#f85149;--red-bg:#2d0f0f;--red-bd:#6e1c1c;
  --gold:#d29922;--gold-bg:#1f1a0a;
  --blue:#58a6ff;--purple:#bc8cff;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  max-width:680px;margin:0 auto;padding-bottom:40px;
}
.hdr{background:linear-gradient(160deg,#1a2740,#0d1117);border-bottom:1px solid var(--border);padding:14px 16px;text-align:center}
.hdr-sub{font-size:11px;color:var(--muted);margin-bottom:3px;letter-spacing:.03em}
.hdr-main{font-size:19px;font-weight:700}
.hdr-main em{color:#F39800;font-style:normal}

.banner{margin:14px 14px 10px;padding:18px 16px;border-radius:14px;text-align:center;transition:all .3s}
.banner.ok{background:var(--green-bg);border:1px solid var(--green-bd)}
.banner.ng{background:var(--red-bg);border:1px solid var(--red-bd)}
.banner.mid{background:var(--card);border:1px solid var(--border)}
.b-prob{font-size:46px;font-weight:800;line-height:1;transition:color .3s}
.b-label{font-size:13px;margin-top:5px;font-weight:600}
.b-sub{font-size:11px;color:var(--muted);margin-top:3px}

.bars{margin:0 14px 12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:11px;color:var(--muted);width:56px;flex-shrink:0}
.bar-wrap{flex:1;background:var(--border);border-radius:4px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .35s ease;width:0}
.bar-val{font-size:12px;font-weight:700;width:44px;text-align:right;flex-shrink:0;transition:color .3s}

.sec{margin:0 14px 12px}
.sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;padding-left:2px}

/* Match card */
.mc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:9px}
.mc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mc-team{font-size:13px;font-weight:700;flex:1}
.mc-team.home{text-align:left}
.mc-team.away{text-align:right}
.mc-vs{font-size:11px;color:var(--muted);margin:0 8px}
.mc-result{text-align:center;font-size:11px;color:var(--muted);margin-top:2px;min-height:16px}
.mc-result .decided{font-weight:700;font-size:12px}
.mc-result .decided.win{color:var(--green)}
.mc-result .decided.draw{color:var(--gold)}

/* Score row */
.score-section{margin-top:6px}
.score-row{display:flex;align-items:center;gap:0;margin-bottom:6px}
.score-row:last-child{margin-bottom:0}
.score-label{font-size:10px;color:var(--muted);width:32px;flex-shrink:0;text-align:center}
.score-team{flex:1;display:flex;align-items:center;justify-content:center;gap:6px}
.score-team .name{font-size:10px;font-weight:600;width:44px;text-align:center;white-space:nowrap;overflow:hidden}
.score-num{font-size:22px;font-weight:800;width:30px;text-align:center;line-height:1}
.score-dash{font-size:16px;color:var(--muted);margin:0 2px;flex-shrink:0}
.sbtn{
  width:28px;height:28px;border-radius:6px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:16px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:all .15s;flex-shrink:0;
}
.sbtn:active{transform:scale(.9);background:var(--border)}
.sbtn.minus{color:var(--red)}
.sbtn.plus{color:var(--green)}

/* Total score */
.total-row{display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.total-label{font-size:10px;color:var(--muted)}
.total-score{font-size:24px;font-weight:800}
.total-dash{font-size:18px;color:var(--muted);margin:0 4px}

/* PK buttons */
.pk-row{display:flex;gap:6px;margin-top:8px;justify-content:center}
.pk-btn{
  flex:1;max-width:140px;padding:8px 6px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--muted);cursor:pointer;font-size:11px;font-weight:600;
  text-align:center;transition:all .18s;-webkit-tap-highlight-color:transparent;
}
.pk-btn:active{transform:scale(.95)}
.pk-btn.sel{border-width:2px}

/* Standings table */
.stbl-wrap{margin:0 14px 12px;background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.stbl-title{font-size:11px;font-weight:600;color:var(--muted);padding:10px 14px 6px;letter-spacing:.03em}
.stbl{width:100%;border-collapse:collapse;font-size:11px}
.stbl th{background:var(--surface);padding:5px 6px;text-align:center;color:var(--muted);
  font-weight:500;font-size:10px;border-bottom:1px solid var(--border)}
.stbl th:first-child,.stbl td:first-child{text-align:center;width:22px}
.stbl th:nth-child(2),.stbl td:nth-child(2){text-align:left;padding-left:8px}
.stbl td{padding:6px 6px;border-bottom:1px solid var(--border);text-align:center}
.stbl tr:last-child td{border-bottom:none}
.stbl .team-name{font-weight:700}
.stbl .pts{font-weight:800;font-size:13px}
.stbl tr.qualify{background:var(--green-bg)}
.stbl tr.wc{background:#1a1040}
.stbl tr.omiya td{border-left:2px solid #F39800}
.stbl .badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.badge-1st{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge-wc{background:#1a1040;color:var(--purple);border:1px solid #4c2a8a}
.badge-out{background:var(--surface);color:var(--muted)}

/* Reset */
.reset{display:block;width:calc(100% - 28px);margin:4px 14px 10px;padding:11px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  color:var(--muted);font-size:13px;cursor:pointer;text-align:center}

/* Info */
.info-box{margin:0 14px 10px;background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.info-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;border-bottom:0}
.info-hdr.open{border-bottom:1px solid var(--border)}
.info-hdr-title{font-size:12px;font-weight:600}
.info-icon{font-size:11px;color:var(--muted)}
.info-body{padding:12px 14px;font-size:11.5px;color:var(--muted);line-height:1.7;display:none}
.info-body.show{display:block}
.cond{padding:6px 0;border-bottom:1px solid var(--border);color:var(--text)}
.cond:last-child{border-bottom:none}
.cond .tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;margin-right:6px;vertical-align:middle}
.tag-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.tag-wc{background:#1a1040;color:var(--purple);border:1px solid #4c2a8a}
.tag-ng{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

.sc-count{text-align:center;font-size:11px;color:var(--muted);margin:2px 0 8px}

/* Team colors */
.c-omiya{color:#F39800}.c-elfen{color:#2862E0}.c-hiroshima{color:#7B2D8E}
.c-inac{color:#E60012}.c-sendai{color:#5BC0EB}.c-nagano{color:#FF6600}
.c-chiba{color:#B8960B}.c-beleza{color:#00A651}

.pk-btn.pk-omiya{border-color:#F39800;background:rgba(243,152,0,.15);color:#F39800}
.pk-btn.pk-elfen{border-color:#2862E0;background:rgba(40,98,224,.15);color:#2862E0}
.pk-btn.pk-hiroshima{border-color:#7B2D8E;background:rgba(123,45,142,.15);color:#7B2D8E}
.pk-btn.pk-inac{border-color:#E60012;background:rgba(230,0,18,.15);color:#E60012}
.pk-btn.pk-sendai{border-color:#5BC0EB;background:rgba(91,192,235,.15);color:#5BC0EB}
.pk-btn.pk-nagano{border-color:#FF6600;background:rgba(255,102,0,.15);color:#FF6600}
.pk-btn.pk-chiba{border-color:#FDD000;background:rgba(253,208,0,.15);color:#B8960B}
.pk-btn.pk-beleza{border-color:#00A651;background:rgba(0,166,81,.15);color:#00A651}

/* View mode */
body.view-mode .sbtn,body.view-mode .pk-btn,body.view-mode .reset{display:none!important}
body.view-mode .score-row{pointer-events:none}

/* Mode badge */
.mode-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-top:4px;font-weight:600}
.mode-badge.admin{background:rgba(243,152,0,.2);color:#F39800;border:1px solid #F39800}
.mode-badge.viewer{background:rgba(91,192,235,.2);color:#5BC0EB;border:1px solid #5BC0EB}

/* Sync status */
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
.sync-dot.online{background:var(--green)}.sync-dot.offline{background:var(--red)}
.sync-status{font-size:10px;color:var(--muted);text-align:center;margin-top:3px}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="hdr">
  <div class="hdr-sub">WEリーグカップ (クラシエカップ) グループステージ最終節</div>
  <div class="hdr-main"><em>RB大宮</em> 突破シミュレーター</div>
  <div id="modeBadge"></div>
  <div class="sync-status" id="syncStatus"></div>
</div>

<div class="banner mid" id="banner">
  <div class="b-prob" id="bProb">91.8%</div>
  <div class="b-label" id="bLabel">突破確率</div>
  <div class="b-sub" id="bSub">スコアを入力してください</div>
</div>

<div class="bars">
  <div class="bar-row">
    <div class="bar-lbl">1位通過</div>
    <div class="bar-wrap"><div class="bar-fill" id="bar1" style="background:var(--blue)"></div></div>
    <div class="bar-val" id="val1" style="color:var(--blue)">-</div>
  </div>
  <div class="bar-row">
    <div class="bar-lbl">WC通過</div>
    <div class="bar-wrap"><div class="bar-fill" id="barWC" style="background:var(--purple)"></div></div>
    <div class="bar-val" id="valWC" style="color:var(--purple)">-</div>
  </div>
  <div class="bar-row">
    <div class="bar-lbl">敗退</div>
    <div class="bar-wrap"><div class="bar-fill" id="barL" style="background:var(--red)"></div></div>
    <div class="bar-val" id="valL" style="color:var(--red)">-</div>
  </div>
</div>

<div class="sec">
  <div class="sec-title">グループ A</div>
  <div class="mc" id="mc_a1"></div>
  <div class="mc" id="mc_a2"></div>
</div>

<div class="sec">
  <div class="sec-title">グループ B</div>
  <div class="mc" id="mc_b1"></div>
  <div class="mc" id="mc_b2"></div>
</div>

<div class="stbl-wrap" id="stblA"></div>
<div class="stbl-wrap" id="stblB"></div>

<button class="reset" onclick="resetAll()">↺ リセット</button>

<div class="info-box">
  <div class="info-hdr open">
    <span class="info-hdr-title">突破条件</span>
  </div>
  <div class="info-body show">
    <div class="cond"><span class="tag tag-ok">1位通過</span>大宮がちふれに<strong>90分勝利</strong> → グループ1位確定</div>
    <div class="cond"><span class="tag tag-ok">1位通過</span>大宮が<strong>PK勝ち or PK負け</strong> かつ 広島が同勝点以下 → 1位</div>
    <div class="cond"><span class="tag tag-wc">WC通過</span>大宮A2位でも、<strong>勝点 or 得失点差</strong>でB組2位を上回れば突破</div>
    <div class="cond"><span class="tag tag-ng">敗退</span>ちふれに<strong>90分負け</strong> かつ 広島が勝点上 かつ B組2位が大宮を上回る</div>
  </div>
</div>

<div class="sc-count" id="scCount"></div>

<script>
// Match definitions
const MATCHES = {
  a1:{id:'a1',home:'ちふれ',away:'RB大宮',hc:'c-elfen',ac:'c-omiya',
      pkH:'pk-elfen',pkA:'pk-omiya',
      homeBase:{pts:3,gd:-5,gf:4},awayBase:{pts:11,gd:7,gf:12}},
  a2:{id:'a2',home:'広島',away:'INAC',hc:'c-hiroshima',ac:'c-inac',
      pkH:'pk-hiroshima',pkA:'pk-inac',
      homeBase:{pts:11,gd:4,gf:10},awayBase:{pts:5,gd:-3,gf:5}},
  b1:{id:'b1',home:'仙台',away:'AC長野',hc:'c-sendai',ac:'c-nagano',
      pkH:'pk-sendai',pkA:'pk-nagano',
      homeBase:{pts:9,gd:1,gf:3},awayBase:{pts:0,gd:-8,gf:1}},
  b2:{id:'b2',home:'千葉',away:'ベレーザ',hc:'c-chiba',ac:'c-beleza',
      pkH:'pk-chiba',pkA:'pk-beleza',
      homeBase:{pts:10,gd:1,gf:2},awayBase:{pts:11,gd:4,gf:8}}
};

// Match state
const state = {};
for(const k of Object.keys(MATCHES)){
  state[k] = {h1h:0,h1a:0,h2h:0,h2a:0,entered:false,pk:null};
}

// H2H tiebreakers (pre-calculated from MD1-5)
// A組: 大宮 vs 広島: 大宮 4pt, 広島 2pt → 大宮が上
// B組: 東京vs千葉 MD1: 0-0 PK千葉勝ち。 東京vs仙台: 東京5,仙台1。 千葉vs仙台: 仙台4,千葉2

let infoOpen=false;

function getMatchResult(mid){
  const s=state[mid];
  const m=MATCHES[mid];
  const totalH=s.h1h+s.h2h;
  const totalA=s.h1a+s.h2a;
  const gd=totalH-totalA; // from home perspective
  if(!s.entered) return null;
  if(totalH>totalA) return{type:'homeW',homePts:3,awayPts:0,homeGd:gd,awayGd:-gd,homeGf:totalH,awayGf:totalA};
  if(totalH<totalA) return{type:'awayW',homePts:0,awayPts:3,homeGd:gd,awayGd:-gd,homeGf:totalH,awayGf:totalA};
  // Draw
  if(s.pk==='home') return{type:'homePK',homePts:2,awayPts:1,homeGd:0,awayGd:0,homeGf:totalH,awayGf:totalA};
  if(s.pk==='away') return{type:'awayPK',homePts:1,awayPts:2,homeGd:0,awayGd:0,homeGf:totalH,awayGf:totalA};
  return{type:'draw',homeGd:0,awayGd:0,homeGf:totalH,awayGf:totalA}; // PK not decided yet
}

function isDraw(mid){
  const s=state[mid];
  return s.entered && (s.h1h+s.h2h)===(s.h1a+s.h2a);
}

function isDecided(mid){
  const s=state[mid];
  if(!s.entered) return false;
  const totalH=s.h1h+s.h2h;
  const totalA=s.h1a+s.h2a;
  if(totalH!==totalA) return true;
  return s.pk!==null;
}

// Map match result to old-style result key for B2PT lookup
function resultKey(mid){
  const r=getMatchResult(mid);
  const m=MATCHES[mid];
  if(!r) return null;
  if(mid==='a1'){
    if(r.type==='awayW') return '大宮90';
    if(r.type==='awayPK') return '大宮PK';
    if(r.type==='homePK') return 'ちふれPK';
    if(r.type==='homeW') return 'ちふれ90';
    return null;
  }
  if(mid==='a2'){
    if(r.type==='homeW') return '広島90';
    if(r.type==='homePK') return '広島PK';
    if(r.type==='awayPK') return 'INAC_PK';
    if(r.type==='awayW') return 'INAC90';
    return null;
  }
  if(mid==='b1'){
    if(r.type==='homeW') return '仙台90';
    if(r.type==='homePK') return '仙台PK';
    if(r.type==='awayPK') return '長野PK';
    if(r.type==='awayW') return '長野90';
    return null;
  }
  if(mid==='b2'){
    if(r.type==='homeW') return '千葉90';
    if(r.type==='homePK') return '千葉PK';
    if(r.type==='awayPK') return 'ベレーザPK';
    if(r.type==='awayW') return 'ベレーザ90';
    return null;
  }
}

const A1_RESULTS=['大宮90','大宮PK','ちふれPK','ちふれ90'];
const A2_RESULTS=['広島90','広島PK','INAC_PK','INAC90'];
const B1_RESULTS=['仙台90','仙台PK','長野PK','長野90'];
const B2_RESULTS=['千葉90','千葉PK','ベレーザPK','ベレーザ90'];

const BONUS_A1={'大宮90':3,'大宮PK':2,'ちふれPK':1,'ちふれ90':0};
const BONUS_A2={'広島90':3,'広島PK':2,'INAC_PK':1,'INAC90':0};

const B2PT={
  '仙台90':{'千葉90':12,'千葉PK':12,'ベレーザPK':12,'ベレーザ90':12},
  '仙台PK':{'千葉90':11,'千葉PK':12,'ベレーザPK':11,'ベレーザ90':11},
  '長野PK':{'千葉90':11,'千葉PK':12,'ベレーザPK':11,'ベレーザ90':10},
  '長野90':{'千葉90':11,'千葉PK':12,'ベレーザPK':11,'ベレーザ90':10}
};

// GD data for B2 (base GD for each possible B2 team)
const B_TEAM_BASE = {
  '東京NB':{pts:11,gd:4,gf:8},
  '千葉':{pts:10,gd:1,gf:2},
  '仙台':{pts:9,gd:1,gf:3}
};

// Calculate B2 team identity and GD
function getB2Info(b1key,b2key){
  const pts=B2PT[b1key][b2key];
  // Determine which team is B2
  const sendaiPts=9+({'仙台90':3,'仙台PK':2,'長野PK':1,'長野90':0}[b1key]);
  const chibaPts=10+({'千葉90':3,'千葉PK':2,'ベレーザPK':1,'ベレーザ90':0}[b2key]);
  const tokyoPts=11+({'千葉90':0,'千葉PK':1,'ベレーザPK':2,'ベレーザ90':3}[b2key]);

  // Find who is B2 (2nd place)
  const teams=[
    {name:'東京NB',pts:tokyoPts,baseGd:4},
    {name:'千葉',pts:chibaPts,baseGd:1},
    {name:'仙台',pts:sendaiPts,baseGd:1}
  ];
  teams.sort((a,b)=>b.pts-a.pts||(b.baseGd-a.baseGd));
  return{team:teams[1].name,pts:teams[1].pts,baseGd:teams[1].baseGd};
}

function calc(a1,a2,b1,b2){
  const op=11+BONUS_A1[a1], hp=11+BONUS_A2[a2];
  const rank=op>=hp?1:2;
  const b2pt=B2PT[b1][b2];

  // Get actual GD if scores entered
  let omiyaGd=7, b2Gd=0;
  const a1r=getMatchResult('a1');
  if(a1r && a1r.awayGd!==undefined) omiyaGd=7+a1r.awayGd;

  const b2info=getB2Info(b1,b2);
  b2Gd=b2info.baseGd;
  // Add match GD for B2 team if scores entered
  const b1r=getMatchResult('b1');
  const b2r=getMatchResult('b2');
  if(b2info.team==='仙台' && b1r) b2Gd=1+b1r.homeGd;
  if(b2info.team==='千葉' && b2r) b2Gd=1+b2r.homeGd;
  if(b2info.team==='東京NB' && b2r) b2Gd=4+b2r.awayGd;

  if(rank===1) return{status:'突破',route:'1位通過',op,hp,rank,b2pt,omiyaGd,b2Gd};
  if(op>b2pt) return{status:'突破',route:'WC通過',op,hp,rank,b2pt,omiyaGd,b2Gd};
  if(op===b2pt){
    // Same points: compare GD
    if(omiyaGd>b2Gd) return{status:'突破',route:'WC通過(GD)',op,hp,rank,b2pt,omiyaGd,b2Gd};
    if(omiyaGd<b2Gd) return{status:'敗退',route:'敗退(GD)',op,hp,rank,b2pt,omiyaGd,b2Gd};
    // Same GD: compare GF
    return{status:'突破',route:'WC通過(GD)',op,hp,rank,b2pt,omiyaGd,b2Gd}; // Omiya likely wins on GF
  }
  return{status:'敗退',route:'敗退',op,hp,rank,b2pt,omiyaGd,b2Gd};
}

function getList(mid,results){
  const k=resultKey(mid);
  return k?[k]:results;
}

function calcStats(){
  const a1s=getList('a1',A1_RESULTS);
  const a2s=getList('a2',A2_RESULTS);
  const b1s=getList('b1',B1_RESULTS);
  const b2s=getList('b2',B2_RESULTS);
  const scens=[];
  for(const a1 of a1s)for(const a2 of a2s)
  for(const b1 of b1s)for(const b2 of b2s)
    scens.push({a1,a2,b1,b2,...calc(a1,a2,b1,b2)});
  const n=scens.length;
  const adv=scens.filter(s=>s.status==='突破').length;
  const r1=scens.filter(s=>s.route==='1位通過').length;
  const wc=scens.filter(s=>s.route.startsWith('WC')).length;
  return{scens,n,advP:adv/n,r1P:r1/n,wcP:wc/n,loseP:(n-adv)/n};
}

function fmt(p){
  if(p>=1)return'100%';if(p<=0)return'0%';
  return(p*100).toFixed(1)+'%';
}

function adj(mid,field,delta){
  const s=state[mid];
  s[field]=Math.max(0,s[field]+delta);
  s.entered=true;
  // Reset PK if no longer a draw
  const totalH=s.h1h+s.h2h;
  const totalA=s.h1a+s.h2a;
  if(totalH!==totalA) s.pk=null;
  updateDisplay(mid);
  update();
}

function setPK(mid,winner){
  state[mid].pk=state[mid].pk===winner?null:winner;
  updateDisplay(mid);
  update();
}

function updateDisplay(mid){
  const s=state[mid];
  const m=MATCHES[mid];
  document.getElementById(mid+'_h1h').textContent=s.h1h;
  document.getElementById(mid+'_h1a').textContent=s.h1a;
  document.getElementById(mid+'_h2h').textContent=s.h2h;
  document.getElementById(mid+'_h2a').textContent=s.h2a;
  const totalH=s.h1h+s.h2h;
  const totalA=s.h1a+s.h2a;
  document.getElementById(mid+'_th').textContent=totalH;
  document.getElementById(mid+'_ta').textContent=totalA;

  // Result text
  const resEl=document.getElementById(mid+'_result');
  if(!s.entered){
    resEl.innerHTML='';
  }else if(totalH>totalA){
    resEl.innerHTML=`<span class="decided win">${m.home} 勝利</span>`;
  }else if(totalH<totalA){
    resEl.innerHTML=`<span class="decided win">${m.away} 勝利</span>`;
  }else{
    resEl.innerHTML=s.pk?`<span class="decided draw">${s.pk==='home'?m.home:m.away} PK勝ち</span>`
      :'<span class="decided draw">引分 → PK選択</span>';
  }

  // PK buttons
  const pkRow=document.getElementById(mid+'_pk');
  const pkH=document.getElementById(mid+'_pkH');
  const pkA=document.getElementById(mid+'_pkA');
  if(s.entered && totalH===totalA){
    pkRow.style.display='flex';
    pkH.className=s.pk==='home'?'pk-btn sel '+m.pkH:'pk-btn';
    pkA.className=s.pk==='away'?'pk-btn sel '+m.pkA:'pk-btn';
  }else{
    pkRow.style.display='none';
  }
}

function getTeamStats(name,basePts,baseGf,baseGa,matchId,side){
  let pts=basePts,gf=baseGf,ga=baseGa;
  const r=getMatchResult(matchId);
  if(r){
    if(side==='home'){pts+=r.homePts||0;gf+=r.homeGf;ga+=r.awayGf;}
    else{pts+=r.awayPts||0;gf+=r.awayGf;ga+=r.homeGf;}
    // PK undecided: no pts added but draw counted
    if(r.type==='draw'){pts+=0;gf+=r.homeGf||0;} // leave pts unchanged until PK decided
  }
  return{name,pts,gf,ga,gd:gf-ga};
}

function renderStandings(containerId,title,teams,badgeFn){
  teams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const el=document.getElementById(containerId);
  let html=`<div class="stbl-title">${title}</div>
  <table class="stbl">
  <tr><th>#</th><th>チーム</th><th>勝点</th><th>得</th><th>失</th><th>差</th></tr>`;
  teams.forEach((t,i)=>{
    const gdStr=t.gd>0?'+'+t.gd:t.gd===0?'0':''+t.gd;
    const gdColor=t.gd>0?'var(--green)':t.gd<0?'var(--red)':'var(--muted)';
    const badge=badgeFn?badgeFn(t,i):'';
    const rowCls=i===0?'qualify':badge==='WC'?'wc':'';
    const isOmiya=t.name==='RB大宮';
    let badgeHtml='';
    if(i===0) badgeHtml='<span class="badge badge-1st">進出</span>';
    else if(badge==='WC') badgeHtml='<span class="badge badge-wc">WC</span>';
    html+=`<tr class="${rowCls}${isOmiya?' omiya':''}">
      <td>${i+1}</td>
      <td class="team-name" style="color:${t.color||'var(--text)'}">${t.name}${badgeHtml}</td>
      <td class="pts">${t.pts}</td>
      <td>${t.gf}</td><td>${t.ga}</td>
      <td style="color:${gdColor};font-weight:700">${gdStr}</td></tr>`;
  });
  html+='</table>';
  el.innerHTML=html;
}

function updateStandings(){
  // Group A
  const a1r=getMatchResult('a1');
  const a2r=getMatchResult('a2');
  const aTeams=[
    {name:'RB大宮',pts:11,gf:12,ga:5,color:'#F39800'},
    {name:'S広島',pts:11,gf:10,ga:6,color:'#7B2D8E'},
    {name:'INAC神戸',pts:5,gf:5,ga:8,color:'#E60012'},
    {name:'ちふれ',pts:3,gf:4,ga:9,color:'#2862E0'}
  ];
  // Apply MD6 results
  if(a1r){
    aTeams[3].gf+=a1r.homeGf;aTeams[3].ga+=a1r.awayGf;
    aTeams[0].gf+=a1r.awayGf;aTeams[0].ga+=a1r.homeGf;
    if(a1r.homePts!==undefined){aTeams[3].pts+=a1r.homePts;aTeams[0].pts+=a1r.awayPts;}
  }
  if(a2r){
    aTeams[1].gf+=a2r.homeGf;aTeams[1].ga+=a2r.awayGf;
    aTeams[2].gf+=a2r.awayGf;aTeams[2].ga+=a2r.homeGf;
    if(a2r.homePts!==undefined){aTeams[1].pts+=a2r.homePts;aTeams[2].pts+=a2r.awayPts;}
  }
  aTeams.forEach(t=>t.gd=t.gf-t.ga);

  // Group B
  const b1r=getMatchResult('b1');
  const b2r=getMatchResult('b2');
  const bTeams=[
    {name:'東京NB',pts:11,gf:8,ga:4,color:'#00A651'},
    {name:'千葉L',pts:10,gf:2,ga:1,color:'#B8960B'},
    {name:'仙台L',pts:9,gf:3,ga:2,color:'#5BC0EB'},
    {name:'AC長野',pts:0,gf:1,ga:9,color:'#FF6600'}
  ];
  if(b1r){
    bTeams[2].gf+=b1r.homeGf;bTeams[2].ga+=b1r.awayGf;
    bTeams[3].gf+=b1r.awayGf;bTeams[3].ga+=b1r.homeGf;
    if(b1r.homePts!==undefined){bTeams[2].pts+=b1r.homePts;bTeams[3].pts+=b1r.awayPts;}
  }
  if(b2r){
    bTeams[1].gf+=b2r.homeGf;bTeams[1].ga+=b2r.awayGf;
    bTeams[0].gf+=b2r.awayGf;bTeams[0].ga+=b2r.homeGf;
    if(b2r.homePts!==undefined){bTeams[1].pts+=b2r.homePts;bTeams[0].pts+=b2r.awayPts;}
  }
  bTeams.forEach(t=>t.gd=t.gf-t.ga);

  // Sort to determine 2nd place teams
  aTeams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  bTeams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const a2=aTeams[1], b2=bTeams[1];

  // Compare 2nd place teams for WC
  let wcGroup=null; // which group's 2nd gets WC
  if(a2 && b2){
    if(a2.pts>b2.pts) wcGroup='A';
    else if(a2.pts<b2.pts) wcGroup='B';
    else if(a2.gd>b2.gd) wcGroup='A';
    else if(a2.gd<b2.gd) wcGroup='B';
    else if(a2.gf>b2.gf) wcGroup='A';
    else wcGroup='B';
  }

  renderStandings('stblA','A組 順位表',aTeams,(t,i)=>{
    if(i===1 && wcGroup==='A') return 'WC';
    return '';
  });
  renderStandings('stblB','B組 順位表',bTeams,(t,i)=>{
    if(i===1 && wcGroup==='B') return 'WC';
    return '';
  });
}

function update(){
  const{scens,n,advP,r1P,wcP,loseP}=calcStats();

  const bn=document.getElementById('banner');
  const bp=document.getElementById('bProb');
  const bl=document.getElementById('bLabel');
  const bs=document.getElementById('bSub');
  const decidedCount=Object.keys(state).filter(k=>isDecided(k)).length;
  const enteredCount=Object.keys(state).filter(k=>state[k].entered).length;

  if(n===1){
    const s=scens[0];
    if(s.status==='突破'){
      bn.className='banner ok';
      bp.style.color='var(--green)';bp.textContent='突破確定！';
      bl.textContent=s.route==='1位通過'?'グループ1位通過':'ワイルドカード通過';
      bs.textContent=`大宮${s.op}pt(GD${s.omiyaGd>0?'+':''}${s.omiyaGd})`;
    }else{
      bn.className='banner ng';
      bp.style.color='var(--red)';bp.textContent='敗退...';
      bl.textContent='グループ敗退';
      bs.textContent=`大宮${s.op}pt(GD${s.omiyaGd>0?'+':''}${s.omiyaGd}) / B2位${s.b2pt}pt(GD${s.b2Gd>0?'+':''}${s.b2Gd})`;
    }
  }else if(advP===1){
    bn.className='banner ok';
    bp.style.color='var(--green)';bp.textContent='突破確定！';
    bl.textContent='残り試合に関わらず突破';
    bs.textContent=`残り${n}パターン、全て突破`;
  }else if(advP===0){
    bn.className='banner ng';
    bp.style.color='var(--red)';bp.textContent='敗退確定';
    bl.textContent='突破の可能性なし';
    bs.textContent=`残り${n}パターン、全て敗退`;
  }else{
    bn.className='banner mid';
    bp.style.color=advP>=0.7?'var(--green)':advP>=0.3?'var(--gold)':'var(--red)';
    bp.textContent=fmt(advP);
    bl.textContent='突破確率';
    bs.textContent=enteredCount===0?'全256パターン均等確率で計算':`確定${decidedCount}/4試合 / 残り${n}パターン`;
  }

  document.getElementById('bar1').style.width=(r1P*100)+'%';
  document.getElementById('barWC').style.width=(wcP*100)+'%';
  document.getElementById('barL').style.width=(loseP*100)+'%';
  document.getElementById('val1').textContent=fmt(r1P);
  document.getElementById('valWC').textContent=fmt(wcP);
  document.getElementById('valL').textContent=fmt(loseP);

  const adv=scens.filter(s=>s.status==='突破').length;
  document.getElementById('scCount').textContent=`突破: ${adv} / ${n} パターン`;

  updateStandings();
}

}
